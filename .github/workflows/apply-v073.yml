name: Apply MLB Trading Desk v0.7.3

on:
  push:
    paths:
      - '.github/workflows/apply-v073.yml'

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct v0.7.3 source files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import zlib

          payload_dir = Path('.github/v073_payloads')
          targets = {
              'app_py': Path('app.py'),
              'data_sources_py': Path('data_sources.py'),
              'live_engine_py': Path('live_engine.py'),
          }

          for prefix, target in targets.items():
              parts = sorted(payload_dir.glob(f'{prefix}.*.part'))
              if not parts:
                  raise RuntimeError(f'No payload parts found for {prefix}')
              encoded = ''.join(part.read_text().strip() for part in parts)
              target.write_bytes(zlib.decompress(base64.b64decode(encoded)))
              print(f'Wrote {target} from {len(parts)} payload part(s).')
          PY

      - name: Validate Python syntax
        run: python -m py_compile app.py data_sources.py live_engine.py

      - name: Commit reconstructed source files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py data_sources.py live_engine.py
          git rm -r .github/v073_payloads
          git rm .github/workflows/apply-v073.yml
          git commit -m "Add selected-game live refresh controller"
          git push
